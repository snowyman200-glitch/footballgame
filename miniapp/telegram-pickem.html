const groupMatchIndex = {};
Object.entries(GROUPS).forEach(([group, teams]) => {
  groupMatchIndex[group] = [];
  for (let i=0;i<teams.length;i++) for (let j=i+1;j<teams.length;j++) {
    const id = `${group}-${i}-${j}`;
    state.groupMatches[id] = {home:0, away:0};
    groupMatchIndex[group].push({ id, home:teams[i], away:teams[j], homeIndex:i, awayIndex:j, group });
  }
});

function normalizeScore(score){
  return {
    home: Number.isFinite(Number(score?.home)) ? Math.max(0, Math.min(20, Number(score.home))) : 0,
    away: Number.isFinite(Number(score?.away)) ? Math.max(0, Math.min(20, Number(score.away))) : 0
  };
}

function scoreResult(score){
  if(score.home>score.away) return 'home';
  if(score.home<score.away) return 'away';
  return 'draw';
}

function standingsForGroup(group){
  const teams = GROUPS[group].map(name => ({team:name,pts:0,gf:0,ga:0,gd:0,w:0,d:0,l:0,group}));

  groupMatchIndex[group].forEach(match => {
    const score = normalizeScore(state.groupMatches[match.id]);
    const h = teams[match.homeIndex], a = teams[match.awayIndex];

    h.gf += score.home; h.ga += score.away;
    a.gf += score.away; a.ga += score.home;

    if (score.home > score.away){ h.pts += 3; h.w += 1; a.l += 1; }
    else if (score.home < score.away){ a.pts += 3; a.w += 1; h.l += 1; }
    else { h.pts += 1; a.pts += 1; h.d += 1; a.d += 1; }
  });

  teams.forEach(t=>t.gd=t.gf-t.ga);
  teams.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.team.localeCompare(b.team,'ru'));
  return teams.map((t,i)=>({...t,rank:i+1}));
}

function allStandings(){
  const out={};
  Object.keys(GROUPS).forEach(g=>out[g]=standingsForGroup(g));
  return out;
}

function thirdPlaces(standings){
  const rows = Object.entries(standings).map(([g,t])=>({...t[2],group:g}));
  rows.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.team.localeCompare(b.team,'ru'));
  return rows.map((r,i)=>({...r,overallRank:i+1,qualified:i<8}));
}

function resolveSlot(slot, ctx){
  if(slot.type==='winner') return ctx.standings[slot.group][0].team;
  if(slot.type==='runner') return ctx.standings[slot.group][1].team;
  if(slot.type==='third') return ctx.thirdAssignments[slot.matchId] || 'TBD';
  if(slot.type==='match') return ctx.winners[slot.match]||'TBD';
  if(slot.type==='loser') return ctx.losers[slot.match]||'TBD';
  return 'TBD';
}

function assignThirdTeams(thirds){
  const eligibleQualified = thirds.filter(t => t.qualified && 'CDEFGHIJKL'.includes(t.group));
  const qualifiedKey = eligibleQualified.map(t => t.group).sort().join('');
  const mapping = THIRD_MATRIX[qualifiedKey];

  if(!mapping){
    return {
      __debug: {
        qualifiedKey,
        eligibleGroups: eligibleQualified.map(t => t.group),
        eligibleTeams: eligibleQualified.map(t => `${t.group}: ${t.team}`)
      }
    };
  }

  const byGroup = Object.fromEntries(eligibleQualified.map(t => [t.group, t.team]));
  const assigned = Object.fromEntries(
    Object.entries(mapping).map(([matchId, group]) => [
      Number(matchId.replace('M','')),
      byGroup[group] || 'TBD'
    ])
  );

  assigned.__debug = {
    qualifiedKey,
    eligibleGroups: eligibleQualified.map(t => t.group),
    eligibleTeams: eligibleQualified.map(t => `${t.group}: ${t.team}`)
  };

  return assigned;
}

function computeBracket(){
  const standings=allStandings();
  const thirds=thirdPlaces(standings);
  const thirdAssignments=assignThirdTeams(thirds);
  const ctx={standings,thirds,thirdAssignments,winners:{},losers:{}};

  const matches=PLAYOFF_DEFS.map(def=>{
    const leftSlot = def.left.type==='third' ? {...def.left, matchId:def.id} : def.left;
    const rightSlot = def.right.type==='third' ? {...def.right, matchId:def.id} : def.right;
    const home=resolveSlot(leftSlot,ctx);
    const away=resolveSlot(rightSlot,ctx);
    let winner=state.playoffPicks[def.id]||null;
    if(winner&&winner!==home&&winner!==away) winner=null;
    if(winner){
      ctx.winners[def.id]=winner;
      ctx.losers[def.id]=winner===home?away:home;
    }
    return {...def,home,away,winner};
  });

  return {standings,thirds,matches,thirdAssignments};
}

function safeCleanup(){
  const {matches}=computeBracket();
  matches.forEach(m=>{
    const w=state.playoffPicks[m.id];
    if(w&&w!==m.home&&w!==m.away) delete state.playoffPicks[m.id];
  });
}

  const tabs=document.getElementById('topTabs');
  tabs.innerHTML='';
  [{id:'groups',label:'Группы'},{id:'playoff',label:'Плей-офф'},{id:'results',label:'Итог'}].forEach(t=>{
    const b=document.createElement('button');
    b.className=`tab ${state.currentView===t.id?'active':''}`;
    b.textContent=t.label;
    b.onclick=()=>{state.currentView=t.id; render();};
    tabs.appendChild(b);
  });

  if(state.currentView==='groups'){
    Object.keys(GROUPS).forEach(g=>{
      const b=document.createElement('button');
      b.className=`tab ${state.currentGroup===g?'active':''}`;
      b.textContent=`Группа ${g}`;
      b.onclick=()=>{state.currentGroup=g; render();};
      tabs.appendChild(b);
    });
  }
}

function renderGroups(){
  const wrap=document.getElementById('groupsView');
  const standings=allStandings();
  const thirds=thirdPlaces(standings);
  const matches=groupMatchIndex[state.currentGroup];

  wrap.innerHTML=`<h2 style="margin-top:0">Групповой этап</h2><p class="muted">Теперь ты выбираешь точный счёт каждого матча. Таблица группы и рейтинг третьих мест пересчитываются по забитым и пропущенным мячам.</p><div id="groupMatchList"></div><div class="grid grid-2" style="margin-top:16px"><div class="card"><h3 style="margin-top:0">Таблица группы ${state.currentGroup}</h3><div class="table-wrap"><table><thead><tr><th>#</th><th>Команда</th><th>О</th><th>В</th><th>Н</th><th>П</th><th>ЗМ</th><th>ПМ</th><th>РМ</th></tr></thead><tbody>${standings[state.currentGroup].map(t=>`<tr><td class="${t.rank<3?'rank-good':''}">${t.rank}</td><td>${t.team}</td><td>${t.pts}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td><td>${t.gf}</td><td>${t.ga}</td><td>${t.gd}</td></tr>`).join('')}</tbody></table></div></div><div class="card"><h3 style="margin-top:0">Рейтинг третьих мест</h3><div class="table-wrap"><table><thead><tr><th>#</th><th>Группа</th><th>Команда</th><th>О</th><th>РМ</th><th>Статус</th></tr></thead><tbody>${thirds.map(t=>`<tr><td>${t.overallRank}</td><td>${t.group}</td><td>${t.team}</td><td>${t.pts}</td><td>${t.gd}</td><td class="${t.qualified?'rank-mid':'rank-bad'}">${t.qualified?'Проходит':'Вылетает'}</td></tr>`).join('')}</tbody></table></div></div></div>`;

  const list=wrap.querySelector('#groupMatchList');
  matches.forEach((m,idx)=>{
    const el=document.createElement('div');
    el.className='match';
    const current=normalizeScore(state.groupMatches[m.id]);
    const result=scoreResult(current);

    el.innerHTML=`<strong>Матч ${idx+1}</strong><div class="teams">${m.home} — ${m.away}</div><div class="score-box"><div class="score-control"><div class="score-team">${m.home}</div><div class="score-stepper"><button class="score-btn" data-side="home" data-action="minus" aria-label="Уменьшить голы ${m.home}">−</button><input class="score-input" data-side="home" type="number" min="0" max="20" step="1" value="${current.home}"><button class="score-btn" data-side="home" data-action="plus" aria-label="Увеличить голы ${m.home}">+</button></div></div><span class="score-sep">:</span><div class="score-control"><div class="score-team">${m.away}</div><div class="score-stepper"><button class="score-btn" data-side="away" data-action="minus" aria-label="Уменьшить голы ${m.away}">−</button><input class="score-input" data-side="away" type="number" min="0" max="20" step="1" value="${current.away}"><button class="score-btn" data-side="away" data-action="plus" aria-label="Увеличить голы ${m.away}">+</button></div></div><span class="score-preview small">${result==='home'?m.home+' побеждает':result==='away'?m.away+' побеждает':'Ничья'}</span></div>`;

    const applyScore=(side,value)=>{
      const next=normalizeScore(state.groupMatches[m.id]);
      next[side]=Math.max(0,Math.min(20,value));
      state.groupMatches[m.id]=normalizeScore(next);
      safeCleanup();
      render();
    };

    el.querySelectorAll('.score-input').forEach(inp=>{
      inp.addEventListener('input',e=>{
        const raw=e.target.value;
        applyScore(e.target.dataset.side, raw===''?0:Number(raw));
      });
    });

    el.querySelectorAll('.score-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const side=btn.dataset.side;
        const currentScore=normalizeScore(state.groupMatches[m.id]);
        const delta=btn.dataset.action==='plus'?1:-1;
        applyScore(side, currentScore[side]+delta);
      });
    });

    list.appendChild(el);
  });
}

function renderPlayoff(){
  const wrap=document.getElementById('playoffView');
  const {thirds,matches,thirdAssignments}=computeBracket();
  const debug = thirdAssignments.__debug || {};
  const hasAssignments = Object.keys(thirdAssignments).some(k => k !== '__debug');
  const unresolvedThird = matches.filter(m => [74,77,79,80,81,82,85,87].includes(m.id) && (m.home === 'TBD' || m.away === 'TBD'));

  wrap.innerHTML=`<h2 style="margin-top:0">Плей-офф</h2><p class="muted">Сетка строится из твоих групповых выборов. Здесь выбирается только проходящая команда.</p><div class="notice">8 лучших третьих мест сейчас: ${thirds.filter(t=>t.qualified).map(t=>`${t.team} (${t.group})`).join(', ')}${debug ? `<br><span class="small">Debug: ключ комбинации — ${debug.qualifiedKey || '—'}; группы — ${(debug.eligibleGroups||[]).join(', ') || '—'}</span>` : ''}${debug && !hasAssignments ? `<br><span class="small">Нет схемы для комбинации групп: ${debug.qualifiedKey}</span>` : ''}${unresolvedThird.length ? `<br><span class="small" style="color:#ffb4b4">Не удалось сопоставить третьи места для матчей: ${unresolvedThird.map(m=>m.id).join(', ')}</span>` : ''}</div><div class="bracket-grid" id="bracketGrid" style="margin-top:16px"></div>`;

  const grid=wrap.querySelector('#bracketGrid');
  ROUND_ORDER.forEach(round=>{
    const col=document.createElement('div');
    col.className='bracket-col';

    const header=document.createElement('div');
    header.className='card';
    header.innerHTML=`<strong>${round}</strong>`;
    col.appendChild(header);

    matches.filter(m=>m.round===round).forEach(m=>{
      const c=document.createElement('div');
      c.className='bracket-card';
      c.innerHTML=`<div class="small">Матч ${m.id}</div><div class="bracket-team"><span>${m.home}</span><span>${m.winner===m.home?'<span class="winner-mark">✓</span>':''}</span></div><div class="bracket-team"><span>${m.away}</span><span>${m.winner===m.away?'<span class="winner-mark">✓</span>':''}</span></div><div class="row" style="margin-top:10px"></div>`;

      const row=c.querySelector('.row');
      [m.home,m.away].forEach(team=>{
        const b=document.createElement('button');
        b.className=`btn ${m.winner===team?'primary':'secondary'}`;
        b.textContent=`Проходит: ${team}`;
        b.disabled=(m.home==='TBD'||m.away==='TBD'||m.home===m.away);
        b.onclick=()=>{state.playoffPicks[m.id]=team; render();};
        row.appendChild(b);
      });

      col.appendChild(c);
    });

    grid.appendChild(col);
  });
}

function finalPayload(){
  const {standings,thirds,matches}=computeBracket();
  const final=matches.find(m=>m.id===104);
  const bronze=matches.find(m=>m.id===103);

  return {
    tournament_slug: TOURNAMENT_SLUG,
    submitted_at: new Date().toISOString(),
    user: tg?.initDataUnsafe?.user || null,
    groups: state.groupMatches,
    playoff: state.playoffPicks,
    champion: final?.winner || null,
    runner_up: final?.winner ? (final.winner===final.home?final.away:final.home) : null,
    third_place: bronze?.winner || null,
    fourth_place: bronze?.winner ? (bronze.winner===bronze.home?bronze.away:bronze.home) : null,
    standings,
    third_places: thirds,
    matches
  };
}

async function saveSubmission(){
  const user=tg?.initDataUnsafe?.user;
  if(!BACKEND_BASE_URL){ alert('Не задан BACKEND_BASE_URL в miniapp/config.js'); return; }
  if(!user){ alert('Нужен Telegram user внутри Mini App'); return; }

  const body={
    tournament_slug: TOURNAMENT_SLUG,
    user:{
      telegram_user_id:user.id,
      username:user.username||null,
      first_name:user.first_name||null,
      last_name:user.last_name||null,
      language_code:user.language_code||null
    },
    bracket_payload: finalPayload()
  };

  const res=await fetch(`${BACKEND_BASE_URL}/api/submissions`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });

  if(!res.ok) throw new Error('save failed');
  return res.json();
}

async function fetchCommunity(){
  if(!BACKEND_BASE_URL) return;
  try {
    const res=await fetch(`${BACKEND_BASE_URL}/api/community/${TOURNAMENT_SLUG}`);
    const data=await res.json();
    state.community = data.snapshot?.items || data.items || [];
  } catch(e){
    state.community=[];
  }
}

function renderResults(){
  const wrap=document.getElementById('resultsView');
  const payload=finalPayload();
  const rows=[
    [1,payload.champion||'—'],
    [2,payload.runner_up||'—'],
    [3,payload.third_place||'—'],
    [4,payload.fourth_place||'—']
  ];

  wrap.innerHTML=`<h2 style="margin-top:0">Итог</h2>
  <p class="muted">Итоговые места рассчитываются автоматически на основе твоих выборов.</p>
  <div class="summary-grid">
    <div class="card"><div class="small">Чемпион</div><strong>${payload.champion||'—'}</strong></div>
    <div class="card"><div class="small">Финалист</div><strong>${payload.runner_up||'—'}</strong></div>
    <div class="card"><div class="small">3-е место</div><strong>${payload.third_place||'—'}</strong></div>
    <div class="card"><div class="small">4-е место</div><strong>${payload.fourth_place||'—'}</strong></div>
  </div>
  <div class="grid grid-2" style="margin-top:16px">
    <div class="card">
      <h3 style="margin-top:0">Итоговые места</h3>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Место</th><th>Команда</th></tr></thead>
          <tbody>${rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('')}</tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <h3 style="margin-top:0">Что выбрали другие</h3>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Срез</th><th>Лидер</th><th>Доля</th></tr></thead>
          <tbody>${(state.community.length?state.community:[{label:'Чемпион',leader:'Бразилия',share:'31%'},{label:'Финалист',leader:'Франция',share:'18%'}]).map(i=>`<tr><td>${i.label}</td><td>${i.leader}</td><td>${i.share}</td></tr>`).join('')}</tbody>
        </table>
      </div>
    </div>
  </div>`;
}

function render(){
  renderTabs();
  document.getElementById('groupsView').classList.toggle('hidden',state.currentView!=='groups');
  document.getElementById('playoffView').classList.toggle('hidden',state.currentView!=='playoff');
  document.getElementById('resultsView').classList.toggle('hidden',state.currentView!=='results');
  renderGroups();
  renderPlayoff();
  renderResults();
}

fetchCommunity();
render();
</script>
</body>
</html>
